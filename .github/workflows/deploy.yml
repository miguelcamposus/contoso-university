name: Deploy Contoso University to Azure

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ContosoUniversity.sln

      - name: Build
        run: dotnet build ContosoUniversity.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ContosoUniversity.sln --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ContosoUniversity.Web/ContosoUniversity.Web.csproj --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'contoso-university-web-mg'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish